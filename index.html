<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Github Issue Tracker | Login</title>
  
  <!--tailwind css + daisy ui-->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!--font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
*{
  font-family: "Geist", sans-serif;
}
</style>
</head>
<body class="min-h-screen">
  <section class="max-w-[520px] p-[32px] mt-[60px] mb-[60px] mx-auto">
    <div class="p-3 space-y-10 shadow-lg">
      <div class="image flex justify-center">
       <img class="w-[100px]" src="assets/github-logo.png" alt="" />
      </div>
     <div class="mx-auto text-center items-center">
       <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
       <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
    
    <fieldset class="fieldset w-full p-4 mx-auto">

    <label class="label text-black font-medium">Username</label>
    <input id="userName" type="text" class="input w-full" placeholder="Enter Username" value="admin" />
    <p class="text-primary">Default: admin</p>
    <label class="label text-black font-medium">Password</label>
    <input id="password" type="password" class="input w-full" placeholder="Password" value="admin123" />
    <p class="text-primary">Default: admin123</p>
    <button id="loginBtn" class="btn btn-primary mt-4">Sign In</button>
   </fieldset>
   </div>
  </section>
  <script src="script/login.js"></script>
</body>
</html>
