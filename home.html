<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Github Issue Tracker | Home</title>
  
  <!--tailwind css + daisy ui-->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!--font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
*{
  font-family: "Geist", sans-serif;
}
</style>
</head>
<body>
  <header>
    <nav class="flex flex-col md:flex-row justify-between px-6 py-4 space-y-2">
      <div class="flex items-center space-x-2">
        <img class="max-w-[36px]" src="assets/github-logo.png" alt="" />
        <h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
      </div>
      <div class="flex space-x-3">
       <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search-issue" type="search" required placeholder="Search issues" />
</label>
        <button id="search-issue-btn" class="btn btn-primary">+ New Issues</button>
      </div>
    </nav>
  </header>
  
  <main class="w-[70%] mx-auto bg-gray-100">
    <section class="bg-white">
      <div id="tab-container" class="flex px-6 py-6 gap-2 mb-4">
       <button id="tab-all" onclick="filterIssues('all')" class="px-3 py-1 btn btn-primary rounded cursor-pointer">All</button>
       <button id="tab-open" onclick="filterIssues('open')" class="px-3 py-1 btn rounded cursor-pointer">Open</button>
       <button id="tab-closed" onclick="filterIssues('closed')" class="px-3 py-1 btn rounded cursor-pointer">Closed</button>
      
      </div>
    </section>
    
    <section>
      <div class="my-container border-b shadow-sm border-gray-200">

                <div class=" flex items-center justify-between py-4 flex-col sm:flex-row ">
                    <div class="flex gap-3 mb-4 md:mb-4 ">
                        <div class="w-[50px] h-[50px] rounded-full bg-[#ece4ff] flex justify-center items-center">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 class="text-xl font-semibold">
                                <span id="issue-count" class="inline-block">0</span> Issues
                            </h2>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <!-- open closed section -->
                    <div class="flex gap-3 items-center">
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-green-500 inline-block"></span> Open</p>
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-[#a855f7] inline-block"></span> Closed</p>
                    </div>

                </div>

            </div>

    </section>
  </main>
  
  <!--Card-->
  <div class="w-[70%] mx-auto">
    <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-4 gap-3">
      
    </div>
    <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
      <span class="loading loading-dots loading-xl"></span>
    </div>
    <div id="modal_container">
      <div onclick="allActiveCard(displayShowModal)" id="modal_card" class="modal">
        
      </div>
    </div>
  </div>
  
  <script src="script/home.js"></script>
</body>
</html>
